
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpeedTest Pro · Ungu & Hitam</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0a0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 1rem;
            color: #e4d9ff;
        }

        .card {
            background: #14111c;
            backdrop-filter: blur(2px);
            width: 100%;
            max-width: 560px;
            padding: 2rem 1.8rem 2.2rem;
            border-radius: 2.5rem;
            box-shadow: 0 20px 40px rgba(90, 30, 180, 0.2), 0 0 0 1px rgba(160, 100, 255, 0.08);
            border: 1px solid #2d2440;
            transition: box-shadow 0.2s;
        }

        .card:hover {
            box-shadow: 0 25px 50px rgba(130, 60, 255, 0.15);
            border-color: #4b3a6b;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.8rem;
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            color: #cbb2ff;
        }

        .header-badge {
            background: #2d1f4a;
            padding: 0.2rem 1rem;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 400;
            color: #ab8bff;
            border: 1px solid #4b3a6b;
        }

        /* === PING SECTION === */
        .ping-section {
            background: #1a1528;
            border-radius: 1.8rem;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.8rem;
            border: 1px solid #322a4a;
        }

        .ping-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .ping-section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7a68a8;
        }

        .ping-toggle-btn {
            background: transparent;
            border: 1px solid #4b3a6b;
            color: #9d89cf;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ping-toggle-btn:hover {
            background: #2d1f4a;
            border-color: #6a3de8;
        }

        .ping-toggle-btn.active {
            background: #6a3de8;
            border-color: #6a3de8;
            color: #faf5ff;
        }

        .ping-toggle-btn.active:hover {
            background: #7c4ff5;
        }

        .ping-live {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .ping-live-label {
            font-size: 0.85rem;
            color: #9d89cf;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .ping-live-label .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4a3a6a;
            display: inline-block;
            transition: background 0.3s;
        }

        .ping-live-label .dot.active {
            animation: pulse-dot 0.8s infinite;
            background: #b294ff;
        }

        @keyframes pulse-dot {
            0% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.4); background: #d2bbff; }
            100% { opacity: 0.3; transform: scale(0.8); }
        }

        .ping-value-wrapper {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .ping-value {
            font-size: 1.3rem;
            font-weight: 600;
            color: #f0e8ff;
            background: #251f3a;
            padding: 0.1rem 1.2rem;
            border-radius: 40px;
            border: 1px solid #4b3a6b;
            min-width: 80px;
            text-align: center;
            transition: opacity 0.3s;
        }

        .ping-value.disabled {
            opacity: 0.3;
        }

        .ping-value small {
            font-size: 0.7rem;
            color: #9b83d9;
            font-weight: 300;
        }

        .ping-quality {
            font-size: 0.65rem;
            font-weight: 600;
            padding: 0.15rem 0.7rem;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            min-width: 55px;
            text-align: center;
            transition: all 0.3s;
        }

        .ping-quality.good {
            background: #1a3a2a;
            color: #6fcf97;
            border: 1px solid #2d6b4a;
        }

        .ping-quality.medium {
            background: #3a3a1a;
            color: #f2c94a;
            border: 1px solid #6b6b2d;
        }

        .ping-quality.poor {
            background: #3a1a1a;
            color: #eb5757;
            border: 1px solid #6b2d2d;
        }

        .ping-quality.disabled {
            opacity: 0.3;
            background: transparent;
            border: 1px solid #4a3a6a;
            color: #7a68a8;
        }

        .ping-status {
            font-size: 0.7rem;
            color: #7a68a8;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .ping-status .dot-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4a3a6a;
            display: inline-block;
            transition: background 0.3s;
        }

        .ping-status .dot-indicator.active {
            background: #6fcf97;
            animation: none;
        }

        .ping-status .dot-indicator.disabled {
            background: #4a3a6a;
        }

        /* === SPEED SECTION === */
        .speed-section {
            background: #1a1528;
            border-radius: 1.8rem;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #322a4a;
        }

        .speed-section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7a68a8;
            margin-bottom: 1rem;
        }

        .metric-grid {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 0.3rem;
            border-bottom: 1px solid #28213b;
            flex-wrap: wrap;
            gap: 0.3rem;
        }

        .metric-label {
            font-size: 0.85rem;
            font-weight: 400;
            color: #9d89cf;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .metric-label .bar {
            display: inline-block;
            width: 4px;
            height: 16px;
            background: #8750ff;
            border-radius: 4px;
            opacity: 0.6;
        }

        .metric-right {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .metric-value {
            font-size: 1.2rem;
            font-weight: 500;
            color: #f0e8ff;
            background: #1f1830;
            padding: 0.05rem 0.8rem;
            border-radius: 40px;
            border: 1px solid #372b55;
            min-width: 90px;
            text-align: right;
            transition: all 0.2s;
        }

        .metric-value.realtime {
            border-color: #6a3de8;
            box-shadow: 0 0 20px rgba(106, 61, 232, 0.15);
        }

        .metric-value small {
            font-size: 0.65rem;
            font-weight: 300;
            color: #9b83d9;
            margin-left: 0.2rem;
        }

        .speed-quality {
            font-size: 0.6rem;
            font-weight: 600;
            padding: 0.15rem 0.6rem;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            min-width: 50px;
            text-align: center;
            transition: all 0.3s;
        }

        .speed-quality.good {
            background: #1a3a2a;
            color: #6fcf97;
            border: 1px solid #2d6b4a;
        }

        .speed-quality.medium {
            background: #3a3a1a;
            color: #f2c94a;
            border: 1px solid #6b6b2d;
        }

        .speed-quality.poor {
            background: #3a1a1a;
            color: #eb5757;
            border: 1px solid #6b2d2d;
        }

        .speed-quality.disabled {
            opacity: 0.3;
            background: transparent;
            border: 1px solid #4a3a6a;
            color: #7a68a8;
        }

        /* === MODE & CONTROL === */
        .mode-selector {
            display: flex;
            gap: 0.8rem;
            margin: 0.5rem 0 1rem;
            background: #1a1528;
            padding: 0.4rem;
            border-radius: 3rem;
            border: 1px solid #322a4a;
        }

        .mode-btn {
            flex: 1;
            padding: 0.5rem 0;
            border: none;
            border-radius: 2rem;
            background: transparent;
            color: #9d89cf;
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: #6a3de8;
            color: #faf5ff;
            box-shadow: 0 4px 15px rgba(100, 50, 220, 0.3);
        }

        .mode-btn:hover:not(.active) {
            background: #2d1f4a;
        }

        .action-btn {
            background: #6a3de8;
            border: none;
            width: 100%;
            padding: 0.9rem 0;
            border-radius: 3rem;
            font-weight: 500;
            font-size: 1rem;
            color: #faf5ff;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 18px rgba(100, 50, 220, 0.3);
            border: 1px solid #8555ff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-top: 0.2rem;
        }

        .action-btn:hover:not(:disabled) {
            background: #7c4ff5;
            transform: scale(0.98);
            box-shadow: 0 8px 28px rgba(120, 60, 255, 0.5);
            border-color: #a175ff;
        }

        .action-btn:disabled {
            opacity: 0.6;
            pointer-events: none;
            filter: grayscale(0.3);
        }

        .action-btn.stop {
            background: #b03a5a;
            border-color: #d44a6e;
            box-shadow: 0 6px 18px rgba(180, 50, 80, 0.3);
        }

        .action-btn.stop:hover:not(:disabled) {
            background: #c94a6e;
            border-color: #e05a7e;
        }

        .progress-bar {
            width: 100%;
            height: 3px;
            background: #2d2440;
            border-radius: 10px;
            margin: 0.6rem 0 0.2rem;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .progress-bar.active {
            opacity: 1;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6a3de8, #b294ff);
            border-radius: 10px;
            transition: width 0.3s;
        }

        .footer-note {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.6rem;
            color: #5b4a7a;
            border-top: 1px dashed #2b233f;
            padding-top: 1.2rem;
            letter-spacing: 0.3px;
        }

        .loader-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #b294ff;
            border-radius: 50%;
            animation: pulse-dot 1.2s infinite;
        }

        .legend {
            display: flex;
            gap: 0.8rem;
            margin-top: 0.5rem;
            font-size: 0.55rem;
            color: #7a68a8;
            justify-content: center;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .legend-color {
            width: 10px;
            height: 10px;
            border-radius: 4px;
        }

        .legend-color.good {
            background: #6fcf97;
        }
        .legend-color.medium {
            background: #f2c94a;
        }
        .legend-color.poor {
            background: #eb5757;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <h1>speedtest</h1>
            <span class="header-badge">pro</span>
        </div>

        <!-- ===== PING TEST ===== -->
        <div class="ping-section">
            <div class="ping-header">
                <div class="ping-section-title">ping test</div>
                <button class="ping-toggle-btn" id="pingToggleBtn">nyalakan</button>
            </div>
            <div class="ping-live">
                <div class="ping-live-label">
                    <span class="dot" id="pingDot"></span>
                    google.com
                </div>
                <div class="ping-value-wrapper">
                    <div class="ping-value disabled" id="livePing">-- <small>ms</small></div>
                    <span class="ping-quality disabled" id="pingQuality">--</span>
                </div>
                <div class="ping-status">
                    <span class="dot-indicator disabled" id="pingStatusDot"></span>
                    <span id="pingStatusText">mati</span>
                </div>
            </div>
            <div class="legend">
                <span class="legend-item"><span class="legend-color good"></span> baik (&lt;50ms)</span>
                <span class="legend-item"><span class="legend-color medium"></span> sedang (50-100ms)</span>
                <span class="legend-item"><span class="legend-color poor"></span> buruk (&gt;100ms)</span>
            </div>
        </div>

        <!-- ===== SPEED TEST ===== -->
        <div class="speed-section">
            <div class="speed-section-title">speed test</div>
            <div class="metric-grid">
                <div class="metric-row">
                    <span class="metric-label"><span class="bar"></span> download</span>
                    <div class="metric-right">
                        <span class="metric-value" id="downloadDisplay">-- <small>Mbps</small></span>
                        <span class="speed-quality disabled" id="downloadQuality">--</span>
                    </div>
                </div>
                <div class="metric-row">
                    <span class="metric-label"><span class="bar"></span> upload</span>
                    <div class="metric-right">
                        <span class="metric-value" id="uploadDisplay">-- <small>Mbps</small></span>
                        <span class="speed-quality disabled" id="uploadQuality">--</span>
                    </div>
                </div>
            </div>
            <div class="legend">
                <span class="legend-item"><span class="legend-color good"></span> baik (&gt;25 Mbps)</span>
                <span class="legend-item"><span class="legend-color medium"></span> sedang (5-25 Mbps)</span>
                <span class="legend-item"><span class="legend-color poor"></span> buruk (&lt;5 Mbps)</span>
            </div>
        </div>

        <!-- ===== MODE & CONTROL ===== -->
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="normal" id="modeNormal">Normal 15s</button>
            <button class="mode-btn" data-mode="max" id="modeMax">Max 30s</button>
        </div>

        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <button class="action-btn" id="startBtn">
            <span class="btn-icon">▶</span> mulai tes
        </button>

        <div class="footer-note">
            ungu · hitam · clean · realtime speed update · kualitas warna
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // DOM
            const livePing = document.getElementById('livePing');
            const pingQuality = document.getElementById('pingQuality');
            const pingDot = document.getElementById('pingDot');
            const pingStatusText = document.getElementById('pingStatusText');
            const pingStatusDot = document.getElementById('pingStatusDot');
            const pingToggleBtn = document.getElementById('pingToggleBtn');
            const downloadDisplay = document.getElementById('downloadDisplay');
            const downloadQuality = document.getElementById('downloadQuality');
            const uploadDisplay = document.getElementById('uploadDisplay');
            const uploadQuality = document.getElementById('uploadQuality');
            const startBtn = document.getElementById('startBtn');
            const modeNormal = document.getElementById('modeNormal');
            const modeMax = document.getElementById('modeMax');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');

            // State
            let isRunning = false;
            let isStopped = false;
            let pingInterval = null;
            let testAbortController = null;
            let selectedMode = 'normal';
            let isPingActive = false;

            // Speed test state
            let downloadInterval = null;
            let uploadInterval = null;
            let downloadStartTime = 0;
            let uploadStartTime = 0;
            let downloadBytes = 0;
            let uploadBytes = 0;
            let isDownloading = false;
            let isUploading = false;

            // ---- Utility ----
            function formatSpeed(bps) {
                const mbps = bps / 1_000_000;
                if (!isFinite(mbps) || mbps < 0) return '0.00';
                return mbps.toFixed(2);
            }

            function formatPing(ms) {
                if (!isFinite(ms) || ms < 0 || ms === 0) return '--';
                return ms.toFixed(1);
            }

            function getTestDuration() {
                return selectedMode === 'normal' ? 15000 : 30000;
            }

            // ---- Quality Assessment ----
            function getPingQuality(ms) {
                if (!isFinite(ms) || ms < 0 || ms === 0) return { label: '--', class: 'disabled' };
                if (ms < 50) return { label: 'baik', class: 'good' };
                if (ms <= 100) return { label: 'sedang', class: 'medium' };
                return { label: 'buruk', class: 'poor' };
            }

            function getSpeedQuality(mbps) {
                if (!isFinite(mbps) || mbps < 0 || mbps === 0) return { label: '--', class: 'disabled' };
                if (mbps >= 25) return { label: 'baik', class: 'good' };
                if (mbps >= 5) return { label: 'sedang', class: 'medium' };
                return { label: 'buruk', class: 'poor' };
            }

            function updatePingQuality(ms) {
                const quality = getPingQuality(ms);
                pingQuality.textContent = quality.label;
                pingQuality.className = 'ping-quality ' + quality.class;
            }

            function updateDownloadQuality(mbps) {
                const quality = getSpeedQuality(mbps);
                downloadQuality.textContent = quality.label;
                downloadQuality.className = 'speed-quality ' + quality.class;
            }

            function updateUploadQuality(mbps) {
                const quality = getSpeedQuality(mbps);
                uploadQuality.textContent = quality.label;
                uploadQuality.className = 'speed-quality ' + quality.class;
            }

            // ---- Ping ke Google.com ----
            async function pingGoogle() {
                const url = 'https://www.google.com/favicon.ico?t=' + Date.now();
                const start = performance.now();
                try {
                    await fetch(url, {
                        method: 'HEAD',
                        cache: 'no-store',
                        mode: 'no-cors',
                        signal: AbortSignal.timeout(3000)
                    });
                    const end = performance.now();
                    return end - start;
                } catch (_) {
                    return null;
                }
            }

            // ---- Live Ping Control ----
            function startLivePing() {
                if (pingInterval) return;
                isPingActive = true;
                pingToggleBtn.textContent = 'matikan';
                pingToggleBtn.classList.add('active');
                pingDot.classList.add('active');
                pingStatusDot.classList.remove('disabled');
                pingStatusDot.classList.add('active');
                pingStatusText.textContent = 'live';
                livePing.classList.remove('disabled');
                pingQuality.classList.remove('disabled');

                updatePing();

                pingInterval = setInterval(() => {
                    updatePing();
                }, 1200);
            }

            function stopLivePing() {
                if (pingInterval) {
                    clearInterval(pingInterval);
                    pingInterval = null;
                }
                isPingActive = false;
                pingToggleBtn.textContent = 'nyalakan';
                pingToggleBtn.classList.remove('active');
                pingDot.classList.remove('active');
                pingStatusDot.classList.remove('active');
                pingStatusDot.classList.add('disabled');
                pingStatusText.textContent = 'mati';
                livePing.classList.add('disabled');
                livePing.innerHTML = '-- <small>ms</small>';
                pingQuality.className = 'ping-quality disabled';
                pingQuality.textContent = '--';
            }

            function togglePing() {
                if (isPingActive) {
                    stopLivePing();
                } else {
                    startLivePing();
                }
            }

            async function updatePing() {
                if (!isPingActive) return;
                const ms = await pingGoogle();
                if (ms !== null && isFinite(ms) && ms > 0) {
                    livePing.innerHTML = formatPing(ms) + ' <small>ms</small>';
                    updatePingQuality(ms);
                } else {
                    livePing.innerHTML = '-- <small>ms</small>';
                    pingQuality.className = 'ping-quality disabled';
                    pingQuality.textContent = '--';
                }
            }

            // ---- Speed Test Real-time ----
            async function startDownloadTest(durationMs) {
                const url = 'https://speedtest.tele2.net/10MB.zip?t=' + Date.now();
                downloadStartTime = performance.now();
                downloadBytes = 0;
                isDownloading = true;

                try {
                    const response = await fetch(url, {
                        cache: 'no-store',
                        signal: testAbortController.signal
                    });
                    if (!response.body) throw new Error('No body');

                    const reader = response.body.getReader();
                    while (isDownloading && !isStopped) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        downloadBytes += value.length;
                        updateDownloadSpeed();

                        const elapsed = performance.now() - downloadStartTime;
                        if (elapsed >= durationMs) {
                            await reader.cancel();
                            break;
                        }
                    }
                } catch (err) {
                    if (err.name === 'AbortError') {
                        // User cancel
                    }
                } finally {
                    isDownloading = false;
                }
            }

            async function startUploadTest(durationMs) {
                const payloadSize = 256 * 1024;
                const chunk = new Uint8Array(payloadSize);
                for (let i = 0; i < chunk.length; i += 1024) {
                    chunk[i] = i & 0xff;
                }
                const blob = new Blob([chunk], { type: 'application/octet-stream' });

                uploadStartTime = performance.now();
                uploadBytes = 0;
                isUploading = true;

                try {
                    while (isUploading && !isStopped) {
                        const elapsed = performance.now() - uploadStartTime;
                        if (elapsed >= durationMs) break;

                        await fetch('https://httpbin.org/post?t=' + Date.now(), {
                            method: 'POST',
                            body: blob,
                            cache: 'no-store',
                            signal: testAbortController.signal
                        });
                        uploadBytes += payloadSize;
                        updateUploadSpeed();
                    }
                } catch (err) {
                    if (err.name === 'AbortError') {
                        // User cancel
                    }
                } finally {
                    isUploading = false;
                }
            }

            function updateDownloadSpeed() {
                const elapsed = (performance.now() - downloadStartTime) / 1000;
                if (elapsed < 0.1) return;
                const bps = (downloadBytes * 8) / elapsed;
                const mbps = bps / 1_000_000;
                downloadDisplay.innerHTML = formatSpeed(bps) + ' <small>Mbps</small>';
                downloadDisplay.classList.add('realtime');
                updateDownloadQuality(mbps);

                const progress = Math.min((elapsed / (getTestDuration() / 1000)) * 100, 100);
                progressFill.style.width = progress + '%';
            }

            function updateUploadSpeed() {
                const elapsed = (performance.now() - uploadStartTime) / 1000;
                if (elapsed < 0.1) return;
                const bps = (uploadBytes * 8) / elapsed;
                const mbps = bps / 1_000_000;
                uploadDisplay.innerHTML = formatSpeed(bps) + ' <small>Mbps</small>';
                uploadDisplay.classList.add('realtime');
                updateUploadQuality(mbps);
            }

            // ---- Main Test ----
            async function runTest() {
                if (isRunning) return;
                isRunning = true;
                isStopped = false;

                startBtn.disabled = true;
                startBtn.classList.add('stop');
                startBtn.innerHTML = '⏹ hentikan tes';

                downloadDisplay.innerHTML = '0.00 <small>Mbps</small>';
                uploadDisplay.innerHTML = '0.00 <small>Mbps</small>';
                downloadDisplay.classList.remove('realtime');
                uploadDisplay.classList.remove('realtime');
                downloadQuality.className = 'speed-quality disabled';
                downloadQuality.textContent = '--';
                uploadQuality.className = 'speed-quality disabled';
                uploadQuality.textContent = '--';

                progressBar.classList.add('active');
                progressFill.style.width = '0%';

                const duration = getTestDuration();
                testAbortController = new AbortController();

                const downloadPromise = startDownloadTest(duration);
                const uploadPromise = startUploadTest(duration);

                const progressInterval = setInterval(() => {
                    const elapsed = performance.now() - downloadStartTime;
                    const progress = Math.min((elapsed / duration) * 100, 100);
                    progressFill.style.width = progress + '%';
                }, 200);

                try {
                    await Promise.all([downloadPromise, uploadPromise]);

                    if (isStopped) {
                        downloadDisplay.innerHTML = '⏹ <small>dibatalkan</small>';
                        uploadDisplay.innerHTML = '⏹ <small>dibatalkan</small>';
                        downloadQuality.className = 'speed-quality disabled';
                        downloadQuality.textContent = '--';
                        uploadQuality.className = 'speed-quality disabled';
                        uploadQuality.textContent = '--';
                        progressFill.style.width = '0%';
                    } else {
                        updateDownloadSpeed();
                        updateUploadSpeed();
                        progressFill.style.width = '100%';
                    }
                } catch (err) {
                    console.error(err);
                    if (!isStopped) {
                        downloadDisplay.innerHTML = '❌ <small>error</small>';
                        uploadDisplay.innerHTML = '❌ <small>error</small>';
                        downloadQuality.className = 'speed-quality disabled';
                        downloadQuality.textContent = '--';
                        uploadQuality.className = 'speed-quality disabled';
                        uploadQuality.textContent = '--';
                    }
                } finally {
                    clearInterval(progressInterval);
                    isRunning = false;
                    startBtn.disabled = false;
                    startBtn.classList.remove('stop');
                    startBtn.innerHTML = '<span class="btn-icon">▶</span> mulai tes';
                    progressBar.classList.remove('active');
                    testAbortController = null;
                }
            }

            // ---- Stop Test ----
            function stopTest() {
                if (!isRunning) return;
                isStopped = true;
                isDownloading = false;
                isUploading = false;
                if (testAbortController) {
                    testAbortController.abort();
                }
                startBtn.innerHTML = '⏹ membatalkan ...';
            }

            // ---- Event Listeners ----
            pingToggleBtn.addEventListener('click', togglePing);

            startBtn.addEventListener('click', () => {
                if (isRunning) {
                    stopTest();
                } else {
                    runTest();
                }
            });

            modeNormal.addEventListener('click', () => {
                if (isRunning) return;
                modeNormal.classList.add('active');
                modeMax.classList.remove('active');
                selectedMode = 'normal';
            });

            modeMax.addEventListener('click', () => {
                if (isRunning) return;
                modeMax.classList.add('active');
                modeNormal.classList.remove('active');
                selectedMode = 'max';
            });

            // ---- Init ----
            stopLivePing();
            livePing.innerHTML = '-- <small>ms</small>';
            pingQuality.className = 'ping-quality disabled';
            pingQuality.textContent = '--';
            downloadDisplay.innerHTML = '-- <small>Mbps</small>';
            uploadDisplay.innerHTML = '-- <small>Mbps</small>';
            downloadQuality.className = 'speed-quality disabled';
            downloadQuality.textContent = '--';
            uploadQuality.className = 'speed-quality disabled';
            uploadQuality.textContent = '--';

            console.log('SpeedTest Pro · ungu & hitam · kualitas warna');
        })();
    </script>

</body>
